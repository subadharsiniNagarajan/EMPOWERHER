<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpowerHer - From Home to Business</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <div class="container">
        <div class="landing-content">
            <div class="logo">🌸</div>
            <h1 class="app-title">EmpowerHer</h1>
            <p class="tagline" data-translate="tagline">From Home to Business – Step by Step</p>
            
            <div class="language-section">
                <h2 data-translate="chooseLanguage">Choose Your Language</h2>
                <div class="language-buttons">
                    <button class="lang-btn" data-lang="english">English</button>
                    <button class="lang-btn" data-lang="tamil">தமிழ்</button>
                    <button class="lang-btn" data-lang="hindi">हिंदी</button>
                    <button class="lang-btn" data-lang="telugu">తెలుగు</button>
                    <button class="lang-btn" data-lang="kannada">ಕನ್ನಡ</button>
                    <button class="lang-btn" data-lang="malayalam">മലയാളം</button>
                </div>
            </div>
            
            <div class="name-section">
                <h2 data-translate="whatsYourName">What's Your Name?</h2>
                <input type="text" id="userName" class="name-input" data-translate-placeholder="enterName" placeholder="Enter your name">
            </div>
            
            <button class="start-btn" id="startBtn" data-translate="startJourney">Start My Journey 🚀</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
